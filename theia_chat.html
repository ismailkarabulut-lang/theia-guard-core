<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Theia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1520;
  --surface2: #111d2e;
  --border: #1a2d45;
  --accent: #00d4ff;
  --green: #00ff88;
  --text: #e8f4f8;
  --muted: #4a6b8a;
  --user-bg: #1a3a5c;
  --ai-bg: #0d1520;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.avatar {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #00d4ff, #7c3aed);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-info { flex: 1; }
.header-name { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
.header-name span { color: var(--accent); }
.header-status {
  font-size: 11px;
  color: var(--green);
  font-family: 'Space Mono', monospace;
  display: flex; align-items: center; gap: 4px;
}

.status-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg-avatar.ai { background: linear-gradient(135deg, #00d4ff22, #7c3aed22); border: 1px solid var(--border); }
.msg-avatar.user-av { background: var(--user-bg); border: 1px solid #1a3a5c; }

.bubble {
  max-width: 78%;
  padding: 12px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  position: relative;
}

.message.ai .bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}

.message.user .bubble {
  background: var(--user-bg);
  border: 1px solid #1a3a5c;
  border-top-right-radius: 4px;
  color: var(--text);
}

.bubble-time {
  font-size: 10px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  margin-top: 4px;
}

.message.user .bubble-time { text-align: right; }

.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 14px;
}

.typing span {
  width: 6px; height: 6px;
  background: var(--muted);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.suggestions {
  padding: 12px 16px 8px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.suggestions::-webkit-scrollbar { display: none; }

.suggestion {
  white-space: nowrap;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  transition: all 0.2s;
  flex-shrink: 0;
}
.suggestion:active { background: var(--surface2); transform: scale(0.97); }

.input-area {
  padding: 12px 16px 20px;
  border-top: 1px solid var(--border);
  background: rgba(8,12,20,0.95);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  max-height: 100px;
  line-height: 1.5;
  transition: border-color 0.2s;
}

textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 42px; height: 42px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 18px;
}

.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.error-msg {
  background: rgba(255,59,92,0.1);
  border: 1px solid rgba(255,59,92,0.3);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: #ff3b5c;
  font-family: 'Space Mono', monospace;
}
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🛡</div>
  <div class="header-info">
    <div class="header-name">THEIA <span>AI</span></div>
    <div class="header-status"><div class="status-dot"></div>Çevrimiçi</div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="message ai">
    <div class="msg-avatar ai">🛡</div>
    <div>
      <div class="bubble">Merhaba! Ben Theia. Yapay zeka, teknoloji veya projeler hakkında konuşabiliriz. Ne öğrenmek istiyorsun?</div>
      <div class="bubble-time" id="init-time"></div>
    </div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <div class="suggestion" onclick="sendSuggestion('Bugünün AI haberleri neler?')">Bugünün AI haberleri</div>
  <div class="suggestion" onclick="sendSuggestion('OpenClaw nedir?')">OpenClaw nedir?</div>
  <div class="suggestion" onclick="sendSuggestion('Theia Guard ne işe yarar?')">Theia Guard ne yapar?</div>
  <div class="suggestion" onclick="sendSuggestion('AI ajanlarının güvenlik riskleri neler?')">Güvenlik riskleri</div>
  <div class="suggestion" onclick="sendSuggestion('Bana motivasyon ver')">Motivasyon ver</div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Theia'ya sor..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const SYSTEM_PROMPT = `Sen Theia'sın — Theia Guard projesinin yapay zeka asistanı. Türkçe konuşursun, samimi ve zekisin. Teknik konuları sade bir dille anlatırsın. 

Theia Guard hakkında bilgin var: OpenClaw fork'u üzerine inşa edilmiş, human-in-the-loop onay sistemi olan bir AI güvenlik katmanı. Summer Yue'nun yaşadığı e-posta silme vakasından ilham alındı. Güvenlik prompt'larda değil mimaride yaşamalı.

Kısa ve net cevaplar ver. Gerektiğinde emoji kullan ama abartma.`;

const API_URL = 'http://192.168.1.128:5000/api/chat';
let history = [];
let isLoading = false;

function now() {
  return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

document.getElementById('init-time').textContent = now();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(text) {
  document.getElementById('input').value = text;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = 'message ' + (isUser ? 'user' : 'ai');
  div.innerHTML = `
    <div class="msg-avatar ${isUser ? 'user-av' : 'ai'}">${isUser ? '👤' : '🛡'}</div>
    <div>
      <div class="bubble">${content.replace(/\n/g, '<br>')}</div>
      <div class="bubble-time">${now()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar ai">🛡</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  addTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    } else {
      addMessage('ai', 'Bir hata oluştu. Tekrar dener misin?');
    }
  } catch(e) {
    removeTyping();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.innerHTML = `<div class="msg-avatar ai">🛡</div><div class="error-msg">Bağlantı hatası. API erişimi kontrol et.</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}
</script>
</body>
</html>
